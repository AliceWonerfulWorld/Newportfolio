<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0F172A"/>
  <!-- Background glow -->
  <ellipse cx="400" cy="250" rx="300" ry="180" fill="#00F0FF" opacity="0.07"/>
  <!-- Shield shape -->
  <path d="M400 60 L580 140 L580 280 Q580 400 400 460 Q220 400 220 280 L220 140 Z" fill="none" stroke="#00F0FF" stroke-width="4" opacity="0.8"/>
  <path d="M400 80 L560 152 L560 278 Q560 385 400 438 Q240 385 240 278 L240 152 Z" fill="#00F0FF" opacity="0.05"/>
  <!-- Keyboard keys inside shield -->
  <rect x="310" y="200" width="50" height="40" rx="4" fill="#00F0FF" opacity="0.8"/>
  <text x="335" y="227" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#0F172A">T</text>
  <rect x="375" y="200" width="50" height="40" rx="4" fill="#CCFF00" opacity="0.8"/>
  <text x="400" y="227" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#0F172A">Y</text>
  <rect x="440" y="200" width="50" height="40" rx="4" fill="#FF007A" opacity="0.8"/>
  <text x="465" y="227" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#fff">P</text>
  <!-- Enemy bullets coming in -->
  <circle cx="140" cy="180" r="12" fill="#FF007A" opacity="0.9"/>
  <circle cx="100" cy="240" r="8" fill="#FF007A" opacity="0.7"/>
  <circle cx="660" cy="200" r="10" fill="#FF007A" opacity="0.8"/>
  <!-- Impact lines from shield -->
  <line x1="220" y1="200" x2="160" y2="170" stroke="#00F0FF" stroke-width="3" opacity="0.6"/>
  <line x1="225" y1="250" x2="105" y2="245" stroke="#00F0FF" stroke-width="2" opacity="0.5"/>
  <line x1="580" y1="210" x2="655" y2="195" stroke="#00F0FF" stroke-width="3" opacity="0.6"/>
  <!-- Score display -->
  <text x="280" y="320" font-family="monospace" font-size="14" fill="#00F0FF" opacity="0.8">SCORE: 99980</text>
  <!-- Label -->
  <text x="50" y="460" font-family="monospace" font-size="28" font-weight="900" fill="#00F0FF" letter-spacing="4">TYPEDEFENSE</text>
  <text x="50" y="490" font-family="monospace" font-size="14" fill="#CCFF00" opacity="0.7">Typing Game — Browser-based Tower Defense</text>
</svg>
