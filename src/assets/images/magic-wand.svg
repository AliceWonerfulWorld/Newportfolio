<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0F172A"/>
  <!-- Background blobs -->
  <ellipse cx="600" cy="100" rx="200" ry="120" fill="#FF007A" opacity="0.15"/>
  <ellipse cx="150" cy="380" rx="180" ry="100" fill="#CCFF00" opacity="0.12"/>
  <!-- Wand stick -->
  <line x1="180" y1="420" x2="560" y2="100" stroke="#F8FAFC" stroke-width="12" stroke-linecap="round"/>
  <!-- Wand tip glow -->
  <circle cx="560" cy="100" r="40" fill="#CCFF00" opacity="0.25"/>
  <circle cx="560" cy="100" r="22" fill="#CCFF00" opacity="0.7"/>
  <circle cx="560" cy="100" r="10" fill="#fff"/>
  <!-- Stars -->
  <polygon points="640,60 650,90 680,90 657,108 665,138 640,120 615,138 623,108 600,90 630,90" fill="#CCFF00" opacity="0.9"/>
  <polygon points="480,160 487,180 508,180 492,192 498,213 480,200 462,213 468,192 452,180 473,180" fill="#FF007A" opacity="0.9"/>
  <polygon points="200,200 205,215 221,215 208,224 213,240 200,230 187,240 192,224 179,215 195,215" fill="#00F0FF" opacity="0.8"/>
  <!-- Sparkles -->
  <line x1="620" y1="160" x2="620" y2="200" stroke="#CCFF00" stroke-width="3" opacity="0.6"/>
  <line x1="600" y1="180" x2="640" y2="180" stroke="#CCFF00" stroke-width="3" opacity="0.6"/>
  <line x1="540" y1="200" x2="540" y2="230" stroke="#FF007A" stroke-width="2" opacity="0.6"/>
  <line x1="525" y1="215" x2="555" y2="215" stroke="#FF007A" stroke-width="2" opacity="0.6"/>
  <!-- Label -->
  <text x="50" y="460" font-family="monospace" font-size="28" font-weight="900" fill="#CCFF00" letter-spacing="4">MAGIC WAND</text>
  <text x="50" y="490" font-family="monospace" font-size="14" fill="#00F0FF" opacity="0.7">Wind Wave Hackathon — 3rd Place + Special Award</text>
</svg>
